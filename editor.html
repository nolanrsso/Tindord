<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Tindord — Éditeur de profil</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://api.fontshare.com/v2/css?f[]=clash-display@600,700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
/* ====== DA Tindord (reprise du site) ====== */
:root{
  --accent:#9146FF;
  --c1:#9146FF; --c2:#4a1bc1;
  --bg:#0D0B1E;
  --card:#1c1d22;
  --stroke:rgba(255,255,255,.08);
  --stroke-2:rgba(255,255,255,.14);
  --ink:#fff; --dim:#b9bbbe; --mute:#72767d;
  --violet:#9146FF; --violet-2:#6B2BFF; --pink:#FF7EB6; --pink-2:#FF4FA0; --cyan:#5BE9FF;
}
*{box-sizing:border-box}
/* Scrollbar sombre (cohérent avec le site) */
*{scrollbar-width:thin;scrollbar-color:rgba(255,255,255,.16) transparent}
::-webkit-scrollbar{width:10px;height:10px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.14);border-radius:8px;border:2px solid transparent;background-clip:content-box}
::-webkit-scrollbar-thumb:hover{background:rgba(255,255,255,.26);background-clip:content-box}
html,body{margin:0;height:100%}
body{
  background:var(--bg);color:var(--ink);
  font-family:"Inter",system-ui,sans-serif;
  overflow:hidden;-webkit-font-smoothing:antialiased;
  user-select:none;
}
h1,h2,h3{font-family:"Clash Display","Inter",sans-serif}

/* ===================== FONDS (mêmes scènes que le site) ===================== */
.bg-layer{position:fixed;inset:0;z-index:0;overflow:hidden;transition:opacity .4s ease}
.bg-layer img,.bg-layer video{width:100%;height:100%;object-fit:cover}
.bg-default{background:
  radial-gradient(1200px 800px at 50% -10%, #1c143a 0%, transparent 60%),
  radial-gradient(900px 700px at 100% 100%, #1a0d2c 0%, transparent 55%),
  var(--bg)}
.blob{position:absolute;border-radius:50%;filter:blur(80px);opacity:.78;mix-blend-mode:screen}
.blob.b1{width:680px;height:680px;left:-140px;top:-180px;background:radial-gradient(circle,#7a2bff 0%,#2a0f55 55%,transparent 70%);animation:drift1 22s ease-in-out infinite alternate}
.blob.b2{width:580px;height:580px;right:-120px;top:60px;background:radial-gradient(circle,#ff5fae 0%,#5b1245 55%,transparent 70%);animation:drift2 26s ease-in-out infinite alternate}
.blob.b3{width:460px;height:460px;left:18%;bottom:-180px;background:radial-gradient(circle,#5be9ff 0%,#0d3a55 50%,transparent 70%);opacity:.45;animation:drift3 30s ease-in-out infinite alternate}
.blob.b4{width:380px;height:380px;right:22%;bottom:-200px;background:radial-gradient(circle,#9146ff 0%,#1d0d3a 55%,transparent 70%);animation:drift4 24s ease-in-out infinite alternate}
@keyframes drift1{to{transform:translate(120px,80px) scale(1.08)}}
@keyframes drift2{to{transform:translate(-140px,60px) scale(1.05)}}
@keyframes drift3{to{transform:translate(80px,-60px) scale(1.1)}}
@keyframes drift4{to{transform:translate(-90px,-100px) scale(.95)}}
.bg-stars{background:
  radial-gradient(1000px 720px at 50% -8%, #221354 0%, transparent 60%),
  radial-gradient(820px 640px at 92% 112%, #2a1250 0%, transparent 55%),
  radial-gradient(700px 600px at 6% 100%, #150a30 0%, transparent 55%),
  #04030a}
.bg-stars::before{content:"";position:absolute;inset:-50%;
  background-image:
    radial-gradient(1.4px 1.4px at 20px 30px, rgba(255,255,255,.95), transparent),
    radial-gradient(1px 1px at 120px 110px, rgba(255,255,255,.7), transparent),
    radial-gradient(1.7px 1.7px at 230px 60px, #fff, transparent),
    radial-gradient(1px 1px at 310px 180px, rgba(255,255,255,.6), transparent),
    radial-gradient(1.3px 1.3px at 160px 230px, rgba(255,255,255,.85), transparent);
  background-size:380px 380px;animation:starDrift 140s linear infinite}
@keyframes starDrift{to{transform:translate(-380px,-380px)}}
.bg-pink{background:
  radial-gradient(1100px 800px at 50% -10%, #ff5fae 0%, transparent 55%),
  radial-gradient(900px 720px at 100% 105%, #c026d3 0%, transparent 52%),
  radial-gradient(760px 640px at 0% 100%, #7a1850 0%, transparent 58%),
  linear-gradient(165deg, #2c0a26 0%, #1a0414 60%, #11030d 100%)}
.grain{position:fixed;inset:0;z-index:1;pointer-events:none;opacity:.05;mix-blend-mode:overlay;background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='160' height='160'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%' height='100%' filter='url(%23n)'/></svg>")}

/* ===================== STRUCTURE ===================== */
.topbar{position:fixed;top:0;left:0;right:0;z-index:30;display:flex;align-items:center;gap:14px;padding:12px 22px}
.topbar .logo{height:46px;width:auto;display:block;filter:drop-shadow(0 4px 18px rgba(255,31,158,.55))}
.topbar .crumb{color:var(--dim);font-size:13px;font-weight:600}
.topbar .note{color:var(--dim);font-size:11.5px;border:1px dashed var(--stroke-2);border-radius:999px;padding:5px 12px}
/* Boutons topbar : Aperçu (gauche) / Paramètres (droite) */
.top-btn{display:inline-flex;align-items:center;gap:8px;padding:9px 15px;border-radius:13px;border:1px solid var(--stroke-2);cursor:pointer;
  background:linear-gradient(180deg, rgba(28,22,58,.86), rgba(18,12,42,.86));backdrop-filter:blur(18px) saturate(150%);
  color:#fff;font-family:inherit;font-weight:700;font-size:13px;transition:transform .12s ease,filter .16s ease,border-color .14s ease}
.top-btn:hover{transform:translateY(-1px);filter:brightness(1.1);border-color:rgba(255,255,255,.28)}
.top-btn:active{transform:translateY(0) scale(.97)}
.top-btn svg{width:17px;height:17px}
.top-btn--settings{margin-left:auto}
@media(max-width:560px){.topbar .crumb,.topbar .note{display:none}.top-btn{padding:9px 12px;font-size:0;gap:0}.top-btn svg{width:20px;height:20px}}

.stage{position:fixed;inset:0;z-index:2;display:grid;place-items:center;padding:70px 16px 110px}
.card-zone{position:relative}

/* ===================== ZONES DE PLACEMENT (guide visible pendant le drag) ===================== */
.drop-guide{position:absolute;inset:0;z-index:2;pointer-events:none;opacity:0;transition:opacity .16s ease}
.drop-guide.show{opacity:1}
.drop-guide .gz{position:absolute;inset:0;border:2px dashed rgba(145,70,255,.6);border-radius:20px;box-shadow:0 0 0 9999px rgba(13,11,30,.28)}
.drop-guide .gz::after{content:"Zone GIFs";position:absolute;top:6px;left:50%;transform:translateX(-50%);font-size:10px;font-weight:800;letter-spacing:.06em;color:#C7A5FF;text-transform:uppercase}
.drop-guide .oz{position:absolute;inset:-26% -52%;border:2px dashed rgba(91,233,255,.5);border-radius:50%}
.drop-guide .oz::after{content:"Zone bulles";position:absolute;top:4px;left:50%;transform:translateX(-50%);font-size:10px;font-weight:800;letter-spacing:.06em;color:#9FE9FF;text-transform:uppercase}
.drop-guide[data-mode="gif"] .oz{display:none}
.drop-guide[data-mode="orb"] .gz{opacity:.35}
.drop-guide[data-mode="orb"] .gz::after{display:none}

/* ===================== BULLES (orbes d'intérêt, comme le site) ===================== */
.orb-layer{position:absolute;inset:0;z-index:4;pointer-events:none}
.orb-wrap{position:absolute;transform:translate(-50%,-50%);pointer-events:auto;animation:orbFloat 5s ease-in-out infinite;touch-action:none}
.orb-wrap:nth-child(2n){animation-delay:-1.4s}
.orb-wrap:nth-child(3n){animation-delay:-2.6s}
.orb-wrap.dragging{animation:none;z-index:12}
.orb-wrap.dragging .orb{cursor:grabbing}
@keyframes orbFloat{0%,100%{transform:translate(-50%,-50%)}50%{transform:translate(-50%,calc(-50% - 8px))}}
.orb{
  /* overflow NON masqué → le bouton ✕ (qui dépasse) reste cliquable. L'image est clippée en cercle elle-même. */
  position:relative;width:78px;height:78px;border-radius:50%;cursor:grab;
  display:grid;place-items:center;color:#fff;background:#1c1d22;
  border:2px solid rgba(255,255,255,.25);
  box-shadow:0 12px 30px rgba(0,0,0,.5), 0 0 0 1px rgba(255,255,255,.06) inset;
  transition:transform .18s ease, box-shadow .18s ease;
}
.orb:hover{transform:scale(1.08)}
.orb img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;border-radius:50%}
.orb svg{width:32px;height:32px;position:relative;z-index:1;filter:drop-shadow(0 2px 6px rgba(0,0,0,.5))}
.orb[data-kind="music"]{border-color:rgba(80,255,150,.85);box-shadow:0 0 0 2px rgba(29,185,84,.4),0 0 22px 4px rgba(30,215,96,.7),0 12px 30px rgba(0,0,0,.5)}
.orb[data-kind="game"]{border-color:rgba(141,203,255,.9);box-shadow:0 0 0 2px rgba(47,123,216,.5),0 0 22px 4px rgba(141,203,255,.7),0 12px 30px rgba(0,0,0,.5)}
.orb[data-kind="film"]{border-color:rgba(199,165,255,.85);box-shadow:0 0 0 2px rgba(139,92,246,.5),0 0 22px 4px rgba(199,165,255,.7),0 12px 30px rgba(0,0,0,.5)}
.orb-del{
  /* Toujours visible (plus de clipping) → on peut retirer la bulle d'un clic. */
  position:absolute;top:-6px;right:-6px;width:24px;height:24px;border-radius:50%;z-index:6;
  background:linear-gradient(135deg,#FF4FA0,#C92866);color:#fff;border:2px solid #0d0b1e;
  display:grid;place-items:center;font-size:13px;font-weight:800;cursor:pointer;line-height:1;
  opacity:1;transform:scale(1);transition:transform .12s ease;box-shadow:0 3px 10px rgba(255,79,160,.6);
}
.orb-del:hover{transform:scale(1.15)}
.orb-label{
  margin-top:6px;text-align:center;font-size:10.5px;font-weight:700;color:#fff;max-width:96px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;text-shadow:0 1px 8px rgba(0,0,0,.9);
  pointer-events:none;
}

/* ===================== GIFS (stickers sur la carte, comme le site) ===================== */
.sticker-layer{position:absolute;inset:0;z-index:5;pointer-events:none;overflow:visible}
.sticker{position:absolute;transform-origin:center center;pointer-events:auto;touch-action:none;cursor:grab}
.sticker.dragging{cursor:grabbing}
.sticker-inner{width:100%;border-radius:12px;overflow:hidden;border:2px solid rgba(255,255,255,.7);box-shadow:0 10px 28px rgba(0,0,0,.55),0 0 0 2px rgba(145,70,255,.35)}
.sticker-inner img{width:100%;height:auto;display:block;pointer-events:none}
.sk-handle{position:absolute;width:26px;height:26px;border-radius:50%;display:grid;place-items:center;border:2px solid #fff;box-shadow:0 3px 10px rgba(0,0,0,.5);z-index:6}
.sk-handle svg{width:13px;height:13px;pointer-events:none}
.sk-del{top:-13px;left:-13px;background:#2f3136;color:#fff;cursor:pointer}
.sk-del:hover{background:#FF4FA0}
.sk-rot{top:-13px;right:-13px;background:#9146FF;color:#fff;cursor:grab;touch-action:none}
.sk-size{bottom:-13px;right:-13px;background:#3BD17C;color:#0c2a18;cursor:nwse-resize;touch-action:none}

/* ===================== CARTE DE PROFIL (style .swipe-card) ===================== */
.card{
  position:relative;z-index:3;width:min(92vw,380px);
  border-radius:20px;overflow:hidden;
  background:linear-gradient(180deg, var(--c1) 0%, var(--c2) 100%);
  border:1px solid rgba(255,255,255,.06);
  box-shadow:0 30px 80px rgba(0,0,0,.6), 0 0 0 1px rgba(255,255,255,.04) inset, 0 0 60px color-mix(in srgb, var(--c1) 20%, transparent);
  transition:box-shadow .4s ease;
}
.banner{
  position:relative;height:120px;overflow:hidden;cursor:pointer;
  background:linear-gradient(135deg, color-mix(in srgb,var(--c1) 60%, #1c1d22) 0%, var(--c2) 55%, #1a0d2c 100%);
}
.banner img,.banner .ph{position:absolute;inset:0;width:100%;height:100%}
.banner img{object-fit:cover}
.banner .ph{display:grid;place-items:center;color:rgba(255,255,255,.6);font-size:12.5px;font-weight:600;letter-spacing:.03em}
.avatar{
  /* Identique à la vraie carte (.swipe-card .avatar-wrap) : 140px, anneau 8px, top 74 / left 20 */
  position:absolute;left:20px;top:74px;
  width:140px;height:140px;border-radius:50%;cursor:pointer;z-index:3;
  border:8px solid var(--card);overflow:visible; /* visible → la déco peut dépasser du cercle */
  background:linear-gradient(135deg, var(--pink), var(--violet));
  box-shadow:0 8px 26px rgba(145,70,255,.5);
}
.avatar img{width:100%;height:100%;object-fit:cover;border-radius:50%} /* l'image se clippe elle-même en cercle */
.avatar .ph{width:100%;height:100%;display:grid;place-items:center;font-size:52px;font-weight:800;font-family:"Clash Display",sans-serif;color:#fff;border-radius:50%}
/* Décoration d'avatar Discord (déposée par-dessus, dépasse comme sur la vraie carte) */
.avatar .avi-deco{position:absolute;inset:-12px;width:calc(100% + 24px);height:calc(100% + 24px);object-fit:contain;pointer-events:none;z-index:4}
/* Point de statut (en ligne) — comme la carte de swipe */
.avatar .status-dot{position:absolute;right:2px;bottom:2px;width:22px;height:22px;border-radius:50%;border:5px solid var(--card);box-sizing:content-box;z-index:5;background:#3ba55d}
.body{position:relative;padding:96px 18px 18px;display:flex;flex-direction:column;gap:12px;background:linear-gradient(180deg, rgba(28,29,34,.0), rgba(28,29,34,.0))}
.username{
  margin:0;font-size:32px;font-weight:700;letter-spacing:-.01em;cursor:pointer;line-height:1.05;
  display:inline-flex;align-items:center;gap:8px;align-self:flex-start;color:#fff;text-shadow:0 2px 10px rgba(0,0,0,.4);
}
.username input{font:inherit;color:#fff;background:rgba(0,0,0,.25);border:1.5px solid rgba(255,255,255,.6);border-radius:10px;padding:2px 10px;outline:none;max-width:240px}
.tag{color:rgba(255,255,255,.7);font-size:13px;margin-top:-8px}
.divider{height:1px;background:rgba(255,255,255,.12);margin:2px 0}
.bio{position:relative;padding:11px 13px;border-radius:13px;cursor:pointer;background:rgba(0,0,0,.22);border:1px solid rgba(255,255,255,.12);color:#fff;font-size:13.5px;line-height:1.5;min-height:44px;white-space:pre-wrap}
.bio textarea{width:100%;min-height:74px;resize:vertical;font:inherit;color:#fff;background:transparent;border:none;outline:none}
.label-mini{font-size:10.5px;font-weight:800;letter-spacing:.1em;color:rgba(255,255,255,.65);text-transform:uppercase;margin-bottom:-6px}
.voice{display:flex;align-items:center;gap:11px;padding:10px 13px;border-radius:13px;cursor:pointer;background:rgba(0,0,0,.22);border:1px solid rgba(255,255,255,.12)}
.voice .vp{width:34px;height:34px;border-radius:50%;flex:0 0 auto;display:grid;place-items:center;background:rgba(0,0,0,.35);color:#fff;transition:transform .15s ease}
.voice:hover .vp{transform:scale(1.08)}
.voice .vw{flex:1;display:flex;align-items:center;gap:2.5px;height:26px}
.voice .vw i{width:3px;border-radius:2px;background:rgba(255,255,255,.85)}
.voice .vt{color:rgba(255,255,255,.7);font-size:12px;flex:0 0 auto}
.voice .empty{color:rgba(255,255,255,.7);font-size:13px;flex:1}
.music-chip{display:flex;align-items:center;gap:11px;padding:10px 13px;border-radius:13px;background:rgba(0,0,0,.22);border:1px solid rgba(255,255,255,.12);cursor:pointer}
.music-chip .cov{width:38px;height:38px;border-radius:9px;flex:0 0 auto;background:#222 center/cover;box-shadow:0 4px 14px rgba(0,0,0,.5)}
.music-chip .mi{flex:1;min-width:0;line-height:1.3}
.music-chip .mi b{display:block;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.music-chip .mi small{color:rgba(255,255,255,.7);font-size:11px}
.music-chip .win{font-size:10.5px;color:#fff;border:1px solid rgba(255,255,255,.4);padding:3px 8px;border-radius:999px;flex:0 0 auto}
.music-chip .empty{color:rgba(255,255,255,.7);font-size:13px;flex:1}

/* ===================== AFFORDANCE D'ÉDITION ===================== */
.editable{position:relative;transition:outline-color .18s ease;outline:2px solid transparent;outline-offset:2px;border-radius:13px}
.banner.editable{border-radius:0}
.avatar.editable{border-radius:50%;position:absolute}
.editable:hover{outline-color:rgba(255,255,255,.55)}
.editable::after{content:"✎";position:absolute;top:-8px;right:-8px;z-index:5;width:22px;height:22px;border-radius:50%;display:grid;place-items:center;background:linear-gradient(135deg,#FF7EB6,#9146FF);color:#fff;font-size:11px;font-weight:900;opacity:0;transform:scale(.6);transition:.18s ease;box-shadow:0 4px 12px rgba(145,70,255,.6);pointer-events:none}
.editable:hover::after{opacity:1;transform:scale(1)}
.editable.editing{outline-color:#fff}
.editable.editing::after{display:none}
.banner.editable::after{top:8px;right:8px}
.avatar.editable::after{top:0;right:0}

/* ===================== TOOLBAR (icônes seules) ===================== */
.toolbar{position:fixed;left:50%;bottom:18px;transform:translateX(-50%);z-index:40;display:flex;gap:6px;padding:9px;border-radius:20px;
  background:linear-gradient(180deg, rgba(28,22,58,.86), rgba(18,12,42,.86));border:1px solid var(--stroke-2);
  backdrop-filter:blur(22px) saturate(150%);box-shadow:0 18px 50px rgba(0,0,0,.55), 0 0 0 1px rgba(255,255,255,.04) inset}
.tool{width:52px;height:52px;border-radius:15px;border:1px solid transparent;background:transparent;color:var(--dim);cursor:pointer;display:grid;place-items:center;transition:background .16s ease, color .16s ease, transform .12s ease}
.tool svg{width:24px;height:24px}
.tool:hover{background:rgba(255,255,255,.06);color:#fff;transform:translateY(-2px)}
.tool:active{transform:translateY(0) scale(.96)}
.tool.active{background:linear-gradient(180deg,#A65BFF,#6B2BFF);color:#fff;box-shadow:0 4px 14px rgba(107,43,255,.4)}

/* Actions Annuler / Sauvegarder qui encadrent la toolbar */
.act-fab{position:fixed;bottom:26px;z-index:41;display:inline-flex;align-items:center;gap:8px;padding:13px 22px;border-radius:16px;border:none;cursor:pointer;font-family:inherit;font-weight:800;font-size:14.5px;color:#fff;box-shadow:0 14px 38px rgba(0,0,0,.5),0 0 0 1px rgba(255,255,255,.06) inset;transition:transform .13s ease,filter .16s ease}
.act-fab:hover{transform:translateY(-2px);filter:brightness(1.08)}
.act-fab:active{transform:translateY(0) scale(.97)}
.act-fab svg{width:19px;height:19px}
.act-cancel{left:22px;background:linear-gradient(180deg,#FF5A6E,#D11F3C)}
.act-save{right:22px;background:linear-gradient(180deg,#3BD17C,#1EA362)}
@media(max-width:560px){.act-fab{padding:12px 15px;font-size:0;gap:0}.act-fab svg{width:22px;height:22px}}

/* étiquette « musique d'entrée » juste au-dessus du bouton Annuler */
.music-now{position:fixed;left:22px;bottom:84px;z-index:41;max-width:240px;display:none;align-items:center;gap:9px;padding:8px 12px;border-radius:14px;
  background:linear-gradient(180deg, rgba(28,22,58,.94), rgba(18,12,42,.94));border:1px solid var(--stroke-2);
  backdrop-filter:blur(18px) saturate(150%);box-shadow:0 12px 34px rgba(0,0,0,.5);cursor:pointer}
.music-now.show{display:flex}
.music-now .cov{width:32px;height:32px;border-radius:8px;flex:0 0 auto;background:#222 center/cover;box-shadow:0 3px 10px rgba(0,0,0,.5)}
.music-now .mi{min-width:0;line-height:1.22}
.music-now .mi .note{font-size:9px;color:#C7A5FF;font-weight:800;letter-spacing:.05em;text-transform:uppercase;display:block}
.music-now .mi b{display:block;font-size:12.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:160px}
.music-now .mi small{color:var(--dim);font-size:10.5px}
@media(max-width:560px){.music-now{bottom:78px;max-width:62vw}}

/* yeux : icône œil seule, posée sur le bouton associé (Bulles, GIFs) et sur la carte.
   Masque visuellement l'élément dans l'éditeur uniquement (non sauvegardé). */
.tool-wrap{position:relative;display:inline-flex}
.eye-dot{position:absolute;top:-5px;right:-5px;width:22px;height:22px;border-radius:50%;z-index:3;cursor:pointer;
  display:grid;place-items:center;color:#fff;border:2px solid #0d0b1e;
  background:linear-gradient(135deg,#A65BFF,#6B2BFF);box-shadow:0 3px 9px rgba(107,43,255,.5);transition:.14s ease}
.eye-dot svg{width:12px;height:12px}
.eye-dot:hover{transform:scale(1.12)}
.eye-dot.off{background:linear-gradient(135deg,#FF7EB6,#C92866);box-shadow:0 3px 9px rgba(255,79,160,.55)}
/* œil de la carte : coin haut-droit de la carte */
.eye-dot--card{position:absolute;top:6px;right:6px;z-index:7;width:26px;height:26px}
.eye-dot--card svg{width:14px;height:14px}
/* séparateur + bouton Aperçu collé à droite des 5 outils, dans la même barre */
.tool-sep{width:1px;height:34px;background:var(--stroke-2);margin:0 2px;align-self:center}
.tool--preview{color:#C7A5FF}
.tool--preview:hover{background:rgba(145,70,255,.18);color:#fff}
.hide-card #card{opacity:0;pointer-events:none}
.hide-orbs #orbLayer{opacity:0;pointer-events:none}
.hide-gifs #stickerLayer{opacity:0;pointer-events:none}

/* ===================== SHEET ===================== */
.sheet{position:fixed;left:50%;bottom:92px;transform:translate(-50%,18px);z-index:39;width:min(94vw,520px);max-height:54vh;overflow:hidden auto;border-radius:20px;padding:16px;
  background:linear-gradient(180deg, rgba(28,22,58,.96), rgba(18,12,42,.96));border:1px solid var(--stroke-2);
  backdrop-filter:blur(24px) saturate(150%);box-shadow:0 24px 70px rgba(0,0,0,.65);opacity:0;pointer-events:none;
  transition:opacity .22s ease, transform .26s cubic-bezier(.2,.8,.3,1)}
.sheet.open{opacity:1;pointer-events:auto;transform:translate(-50%,0)}
.sheet h3{margin:0 0 12px;font-size:15px;display:flex;align-items:center;justify-content:space-between;font-weight:700}
.sheet h3 .close{width:26px;height:26px;border-radius:8px;border:1px solid var(--stroke);background:rgba(255,255,255,.05);color:var(--dim);cursor:pointer;font-size:12px;font-family:inherit}
.sheet h3 .close:hover{color:#fff;background:rgba(255,79,160,.18)}

/* catégories de bulles (onglets, comme le site) */
.cats{display:flex;gap:8px;margin-bottom:10px}
.cats button{flex:1;padding:9px;border-radius:11px;border:1.5px solid var(--stroke);background:rgba(255,255,255,.03);color:var(--dim);font-family:inherit;font-weight:700;font-size:12.5px;cursor:pointer;transition:.14s ease}
.cats button:hover{color:#fff}
.cats button.active{border-color:#9146FF;background:rgba(145,70,255,.18);color:#fff}

.search-row{display:flex;gap:8px;margin-bottom:10px}
.search-row input{flex:1;padding:10px 13px;border-radius:11px;font:inherit;color:#fff;outline:none;background:rgba(255,255,255,.05);border:1.5px solid var(--stroke-2)}
.search-row input:focus{border-color:rgba(145,70,255,.6);box-shadow:0 0 0 4px rgba(145,70,255,.16)}

/* suggestions musique/jeu/film (liste avec cover) */
.sugg-list{display:flex;flex-direction:column;gap:6px;max-height:240px;overflow:auto}
.sugg{display:flex;align-items:center;gap:10px;padding:8px;border-radius:11px;cursor:pointer;border:1.5px solid transparent;background:rgba(255,255,255,.03);transition:border-color .14s ease;font-family:inherit;color:var(--ink);text-align:left}
.sugg:hover{border-color:rgba(145,70,255,.55)}
.sugg img{width:42px;height:42px;border-radius:9px;object-fit:cover;flex:0 0 auto;background:#000}
.sugg .ti{flex:1;min-width:0;line-height:1.3}
.sugg .ti b{display:block;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sugg .ti small{color:var(--dim);font-size:11px}
.sugg.loading{opacity:.55;cursor:wait}
.sugg.unavailable{opacity:.32;pointer-events:none}
.sugg .ph-ico{width:42px;height:42px;border-radius:9px;flex:0 0 auto;display:grid;place-items:center;background:rgba(255,255,255,.06);font-size:20px}

/* grille gifs (giphy) */
.gif-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:7px}
.gif-grid button{border:1.5px solid transparent;border-radius:10px;overflow:hidden;cursor:pointer;padding:0;background:#000;aspect-ratio:1;transition:transform .14s ease, border-color .14s ease}
.gif-grid button:hover{transform:scale(1.04);border-color:var(--violet)}
.gif-grid img{width:100%;height:100%;object-fit:cover;display:block}
.hint{color:var(--dim);font-size:12px;text-align:center;padding:14px 6px}

/* fonds */
.bgp-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.bgp-tile{border:1.5px solid var(--stroke);border-radius:13px;overflow:hidden;cursor:pointer;padding:0;aspect-ratio:16/10;position:relative;background:#000;transition:transform .14s ease, border-color .14s ease;font-family:inherit}
.bgp-tile:hover{transform:translateY(-2px)}
.bgp-tile.sel{border-color:var(--violet);box-shadow:0 0 0 2px rgba(145,70,255,.35)}
.bgp-tile .pv{position:absolute;inset:0}
.pv-default{background:radial-gradient(60px 40px at 35% 15%, #7a2bff 0%, transparent 70%),radial-gradient(50px 40px at 100% 100%, #ff5fae 0%, transparent 70%),#0D0B1E}
.pv-stars{background:radial-gradient(40px 30px at 50% 0%, #221354 0%, transparent 70%),#04030a}
.pv-stars::after{content:"";position:absolute;inset:0;background-image:radial-gradient(1px 1px at 14px 12px,#fff,transparent),radial-gradient(1px 1px at 40px 30px,#fff,transparent),radial-gradient(1.5px 1.5px at 70px 16px,#fff,transparent),radial-gradient(1px 1px at 55px 44px,#fff,transparent);background-repeat:repeat}
.pv-pink{background:radial-gradient(50px 40px at 50% 0%, #ff5fae 0%, transparent 65%),radial-gradient(50px 40px at 100% 100%, #c026d3 0%, transparent 60%),linear-gradient(165deg,#2c0a26,#11030d)}
.bgp-tile span{position:absolute;left:0;right:0;bottom:0;padding:4px;font-size:10px;font-weight:800;color:#fff;background:rgba(13,11,30,.55);text-align:center}
.bgp-up{display:grid;place-items:center;color:var(--dim);font-size:22px;background:rgba(255,255,255,.04)}

/* couleur (2 roues = dégradé de la carte) */
.color-wrap{display:flex;gap:18px;align-items:center;flex-wrap:wrap;justify-content:center}
.wheel-col{display:flex;flex-direction:column;align-items:center;gap:6px}
.wheel-col .wl{font-size:10.5px;font-weight:800;color:var(--dim);text-transform:uppercase;letter-spacing:.06em}
.hueWheel{cursor:crosshair;border-radius:50%}
.color-side{display:flex;flex-direction:column;gap:11px;flex:1;min-width:160px}
.grad-prev{height:46px;border-radius:12px;border:1px solid var(--stroke-2);background:linear-gradient(180deg,var(--c1),var(--c2))}
.swatches{display:flex;gap:7px;flex-wrap:wrap}
.swatches button{width:30px;height:30px;border-radius:9px;border:2px solid rgba(255,255,255,.16);cursor:pointer;transition:transform .12s ease}
.swatches button:hover{transform:scale(1.14)}
.color-reset{align-self:flex-start;font-size:12px}

/* musique */
.scrub-zone{margin-top:12px}
.scrub{position:relative;height:74px;border-radius:12px;overflow:hidden;cursor:pointer;background:rgba(255,255,255,.04);border:1px solid var(--stroke)}
#waveCanvas{position:absolute;inset:0;width:100%;height:100%}
.win-sel{position:absolute;top:0;bottom:0;border-radius:10px;cursor:grab;background:rgba(145,70,255,.24);border:2px solid var(--violet);box-shadow:0 0 22px rgba(145,70,255,.4)}
.win-sel:active{cursor:grabbing}
.scrub-times{display:flex;justify-content:space-between;color:var(--dim);font-size:11px;margin-top:6px}
.scrub-label{text-align:center;font-size:13px;font-weight:700;margin-top:8px;color:#C7A5FF}
.row-end{display:flex;gap:9px;justify-content:flex-end;margin-top:13px}

.btn{padding:10px 18px;border-radius:12px;border:1px solid var(--stroke-2);cursor:pointer;background:rgba(255,255,255,.05);color:#fff;font-family:inherit;font-weight:700;font-size:13.5px;transition:transform .13s ease, background .16s ease}
.btn:hover{transform:translateY(-1px);background:rgba(255,255,255,.1)}
.btn.primary{background:linear-gradient(180deg,#A65BFF 0%,#6B2BFF 100%);border:none;box-shadow:0 8px 24px rgba(107,43,255,.45);color:#fff}
.btn.ghost-danger{color:#FF7EB6}

/* ===================== MODALES ===================== */
.modal{position:fixed;inset:0;z-index:80;display:none;place-items:center;padding:18px;background:rgba(8,9,14,.82);backdrop-filter:blur(14px)}
.modal.open{display:grid}
.modal .box{width:min(94vw,480px);border-radius:22px;padding:20px;background:linear-gradient(180deg, rgba(28,22,58,.97), rgba(18,12,42,.97));border:1px solid var(--stroke-2);box-shadow:0 30px 90px rgba(0,0,0,.8);animation:modalIn .3s cubic-bezier(.2,.8,.3,1.15) both}
@keyframes modalIn{from{transform:scale(.88) translateY(14px);opacity:0}}
.modal h3{margin:0 0 14px;font-size:16px;font-weight:700}
.crop-frame{position:relative;margin:0 auto;overflow:hidden;cursor:grab;touch-action:none;background:repeating-conic-gradient(#241a40 0% 25%, #160f2c 0% 50%) 0 0/22px 22px;border:2px solid rgba(145,70,255,.6);box-shadow:0 0 0 2000px rgba(8,9,14,.55)}
.crop-frame:active{cursor:grabbing}
.crop-frame.circle{width:280px;height:280px;border-radius:50%}
.crop-frame.banner{width:100%;aspect-ratio:10/3;border-radius:14px}
.crop-frame img{position:absolute;left:50%;top:50%;max-width:none;pointer-events:none;will-change:transform}
.zoom-row{display:flex;align-items:center;gap:11px;margin-top:16px}
.zoom-row input[type=range]{flex:1;accent-color:#9146FF}
.zoom-row span{font-size:16px;color:var(--dim)}
.rec-zone{display:flex;flex-direction:column;align-items:center;gap:14px;padding:8px 0}
#recCanvas{width:100%;height:84px;border-radius:13px;background:rgba(255,255,255,.04);border:1px solid var(--stroke)}
.rec-btn{width:74px;height:74px;border-radius:50%;border:none;cursor:pointer;background:linear-gradient(180deg,#9146FF,#6B2BFF);color:#fff;display:grid;place-items:center;box-shadow:0 10px 30px rgba(107,43,255,.5);transition:transform .15s ease}
.rec-btn:hover{transform:scale(1.06)}
.rec-btn.recording{background:linear-gradient(135deg,#FF4FA0,#C9184A);animation:recPulse 1.1s ease-in-out infinite}
@keyframes recPulse{0%,100%{box-shadow:0 0 0 0 rgba(255,79,160,.5)}50%{box-shadow:0 0 0 16px rgba(255,79,160,0)}}
.rec-timer{font-variant-numeric:tabular-nums;font-size:20px;font-weight:800;font-family:"Clash Display",sans-serif}
.rec-prev{display:flex;align-items:center;gap:10px;width:100%}
.rec-prev .bar{flex:1;height:6px;border-radius:3px;background:rgba(255,255,255,.08);overflow:hidden}
.rec-prev .bar i{display:block;height:100%;width:0%;background:linear-gradient(90deg,#9146FF,#FF7EB6)}

.toast{position:fixed;left:50%;bottom:104px;transform:translate(-50%,16px);z-index:90;padding:12px 18px;border-radius:14px;font-size:13.5px;font-weight:600;background:linear-gradient(180deg, rgba(28,22,58,.95), rgba(20,16,46,.95));border:1px solid var(--stroke-2);backdrop-filter:blur(18px) saturate(140%);box-shadow:0 18px 50px rgba(0,0,0,.55);opacity:0;pointer-events:none;transition:.24s ease}
.toast.show{opacity:1;transform:translate(-50%,0)}
</style>
</head>

<script>
'use strict';
const GIPHY_KEY = 'XQIOH50ArLIvqYv8hK8BxmDB2QLqnnZ9';
const $ = id => document.getElementById(id);
const fmt = s => Math.floor(s/60) + ':' + String(Math.floor(s%60)).padStart(2,'0');
const clamp = (v,a,b) => Math.max(a, Math.min(b, v));
const esc = s => (s||'').replace(/[<>&"]/g, c=>({'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;'}[c]));

const S = {
  username:'Tindord_user', bio:'',
  avatar:null, banner:null, voice:null, music:null,
  bg:{type:'preset', value:'default'},
  c1:'#9146FF', c2:'#4a1bc1',
  orbs:[],     // {kind,title,sub,cover}
  gifs:[],     // {url,x,y,w,rot}   (x,y = % carte, w = % largeur carte)
};
let toastT=null; function toast(m){const t=$('toast');t.textContent=m;t.classList.add('show');clearTimeout(toastT);toastT=setTimeout(()=>t.classList.remove('show'),2200);}

/* ===== COULEUR = dégradé de la carte (c1 -> c2) ===== */
function darken(hex,amt){const m=/^#?([0-9a-f]{6})$/i.exec(hex);if(!m)return hex;let r=parseInt(m[1].substr(0,2),16),g=parseInt(m[1].substr(2,2),16),b=parseInt(m[1].substr(4,2),16);r=Math.round(r*(1-amt));g=Math.round(g*(1-amt));b=Math.round(b*(1-amt));return '#'+[r,g,b].map(v=>v.toString(16).padStart(2,'0')).join('');}
function applyColor(hex){
  S.c1 = hex; S.c2 = darken(hex,.55);
  const r=document.documentElement.style;
  r.setProperty('--accent',hex); r.setProperty('--c1',S.c1); r.setProperty('--c2',S.c2);
  const hx=$('hexC1'); if(hx && hx!==document.activeElement) hx.value=hex.toUpperCase();
  if(typeof persist==='function') persist();
}
function hslToHex(h,s,l){s/=100;l/=100;const k=n=>(n+h/30)%12;const a=s*Math.min(l,1-l);const f=n=>l-a*Math.max(-1,Math.min(k(n)-3,Math.min(9-k(n),1)));return '#'+[f(0),f(8),f(4)].map(v=>Math.round(v*255).toString(16).padStart(2,'0')).join('');}

(function(){const slot=$('usernameSlot');slot.addEventListener('click',()=>{if(slot.classList.contains('editing'))return;slot.classList.add('editing');const cur=S.username;slot.innerHTML='';const inp=document.createElement('input');inp.value=cur;inp.maxLength=32;slot.appendChild(inp);inp.focus();inp.select();const done=ok=>{const v=ok?(inp.value.trim()||cur):cur;S.username=v;slot.classList.remove('editing');slot.textContent=v;persist();};inp.addEventListener('keydown',e=>{if(e.key==='Enter')done(true);if(e.key==='Escape')done(false);});inp.addEventListener('blur',()=>done(true));});})();

const crop={url:null,shape:'circle',tx:0,ty:0,scale:1,nw:0,nh:0,onOk:null,maxX:0,maxY:0};
function openCrop(url,shape,title,onOk){
  Object.assign(crop,{url,shape,tx:0,ty:0,scale:1.15,nw:0,nh:0,onOk,maxX:0,maxY:0});
  $('cropTitle').textContent=title;
  const f=$('cropFrame');f.className='crop-frame '+(shape==='circle'?'circle':'banner');
  const img=$('cropImg');img.style.transform='translate(-50%,-50%)';$('cropZoom').value=115;
  $('cropModal').classList.add('open');
  // attendre que la frame ait ses dimensions (modale affichée) puis charger l'image
  requestAnimationFrame(()=>{
    img.onload=()=>{crop.nw=img.naturalWidth||1;crop.nh=img.naturalHeight||1;cropPaint();};
    img.src=url; if(img.complete&&img.naturalWidth){crop.nw=img.naturalWidth;crop.nh=img.naturalHeight;cropPaint();}
  });
}
/* Pan = vraie translation (marche dans les 2 axes, contrairement à object-position). */
function cropPaint(){
  const img=$('cropImg'),f=$('cropFrame');const fw=f.clientWidth||280,fh=f.clientHeight||280;
  if(!crop.nw){return;}
  const base=Math.max(fw/crop.nw,fh/crop.nh);          // cover
  const s=base*crop.scale;const dw=crop.nw*s,dh=crop.nh*s;
  crop.maxX=Math.max(0,(dw-fw)/2);crop.maxY=Math.max(0,(dh-fh)/2);
  crop.tx=clamp(crop.tx,-crop.maxX,crop.maxX);crop.ty=clamp(crop.ty,-crop.maxY,crop.maxY);
  img.style.width=dw+'px';img.style.height=dh+'px';
  img.style.transform=`translate(calc(-50% + ${crop.tx}px), calc(-50% + ${crop.ty}px))`;
}
(function(){const frame=$('cropFrame'),zoom=$('cropZoom');
  let drag=null;
  frame.addEventListener('pointerdown',e=>{e.preventDefault();try{frame.setPointerCapture(e.pointerId);}catch(_){}drag={x:e.clientX,y:e.clientY,tx:crop.tx,ty:crop.ty};});
  frame.addEventListener('pointermove',e=>{if(!drag)return;crop.tx=drag.tx+(e.clientX-drag.x);crop.ty=drag.ty+(e.clientY-drag.y);cropPaint();});
  const up=()=>drag=null;frame.addEventListener('pointerup',up);frame.addEventListener('pointercancel',up);
  zoom.addEventListener('input',()=>{crop.scale=zoom.value/100;cropPaint();});
  $('cropCancel').addEventListener('click',()=>{$('cropModal').classList.remove('open');URL.revokeObjectURL(crop.url);});
  $('cropOk').addEventListener('click',()=>{
    $('cropModal').classList.remove('open');
    // tx/ty (px) -> object-position % pour l'affichage sur la carte
    const posX=crop.maxX?clamp(50*(1-crop.tx/crop.maxX),0,100):50;
    const posY=crop.maxY?clamp(50*(1-crop.ty/crop.maxY),0,100):50;
    crop.onOk&&crop.onOk({url:crop.url,posX,posY,scale:crop.scale});
  });})();
function setCroppedMedia(slot,data,ph){slot.innerHTML='';if(!data){slot.innerHTML=ph;return;}const img=document.createElement('img');img.src=data.url;img.style.objectPosition=data.posX+'% '+data.posY+'%';img.style.transform='scale('+data.scale+')';slot.appendChild(img);}

function stopRec(){try{rec.recorder&&rec.recorder.state==='recording'&&rec.recorder.stop();}catch(_){}}

const _itunesCache=new Map();
async function itunesPreview(artist,name){
  const key=((artist||'')+'|'+(name||'')).toLowerCase().trim();
  if(_itunesCache.has(key))return _itunesCache.get(key);
  try{const q=encodeURIComponent(((artist||'')+' '+(name||'')).trim());const resp=await fetch('https://itunes.apple.com/search?term='+q+'&entity=song&limit=1&media=music');const d=await resp.json();const url=d.results?.[0]?.previewUrl||null;_itunesCache.set(key,url);return url;}catch{_itunesCache.set(key,null);return null;}

const _deezerCache=new Map();
function jsonpFetch(url,timeoutMs=5000){return new Promise((resolve,reject)=>{const cbName='dz_cb_'+Date.now()+'_'+Math.random().toString(36).slice(2);const sep=url.includes('?')?'&':'?';const fullUrl=url+sep+'output=jsonp&callback='+cbName;const script=document.createElement('script');const cleanup=()=>{delete window[cbName];script.remove();};const timeout=setTimeout(()=>{cleanup();reject(new Error('jsonp timeout'));},timeoutMs);window[cbName]=data=>{clearTimeout(timeout);cleanup();resolve(data);};script.onerror=()=>{clearTimeout(timeout);cleanup();reject(new Error('jsonp error'));};script.src=fullUrl;document.head.appendChild(script);});}
async function deezerPreview(artist,name){
  const key=((artist||'')+'|'+(name||'')).toLowerCase().trim();
  if(_deezerCache.has(key))return _deezerCache.get(key);
  try{const q=encodeURIComponent(((artist||'')+' '+(name||'')).trim());const data=await jsonpFetch('https://api.deezer.com/search?q='+q+'&limit=1');const url=data?.data?.[0]?.preview||null;_deezerCache.set(key,url);return url;}catch{_deezerCache.set(key,null);return null;}
}
async function searchSpotifyTracks(query,limit=6){
  const token=await getSpotifyToken();
  const resp=await fetch('https://api.spotify.com/v1/search?q='+encodeURIComponent(query)+'&type=track&limit='+limit,{headers:{Authorization:'Bearer '+token}});
  const d=await resp.json();
  const items=(d.tracks?.items||[]).map(t=>({name:t.name,artist:t.artists?.[0]?.name||'',cover:t.album?.images?.[2]?.url||t.album?.images?.[0]?.url||null,previewUrl:t.preview_url,durationMs:t.duration_ms}));

  return items;
}

async function fetchSuggCover(kind,title){
  const k=kind+':'+title;if(_suggCoverCache.has(k))return _suggCoverCache.get(k);
  let cover=null;
  try{
    if(kind==='anime'){const r=await searchAnime(title);cover=(r&&r[0]&&r[0].cover)||null;if(!cover)cover=await wikidataCover(title,['P154','P18']);if(!cover)cover=await wikidataCover(title+' (anime)',['P154','P18']);}
    else if(kind==='game'){cover=await gameCoverOpaque(title);if(!cover)cover=await gameCoverOpaque(title+' (video game)');if(!cover)cover=await wikiPageSummary(title);}
    else if(kind==='film'){
      if(ANIME_TITLES.has(title)){const r=await searchAnime(title);cover=(r&&r[0]&&r[0].cover)||null;if(!cover){const r2=await searchAnime(title+' anime');cover=(r2&&r2[0]&&r2[0].cover)||null;}if(!cover)cover=await wikidataCover(title+' (anime)',['P18','P154']);if(!cover)cover=await wikidataCover(title,['P18','P154']);}
      else{cover=await wikidataCover(title,['P18','P154']);if(!cover)cover=await wikidataCover(title+' (film)',['P18','P154']);if(!cover)cover=await wikidataCover(title+' (TV series)',['P18','P154']);if(!cover)cover=await wikiPageSummary(title);if(!cover){const r=await searchAnime(title);cover=(r&&r[0]&&r[0].cover)||null;}}
    }
  }catch{}
  _suggCoverCache.set(k,cover);persistCoverCache();return cover;
}
function curatedMatches(query,kind,limit){
  const arr=ORB_SUGGESTIONS[kind]||[];const q=(query||'').toLowerCase().trim();
  if(!q)return arr.slice(0,limit);
  const starts=[],contains=[];
  for(const t of arr){const lt=t.toLowerCase();if(lt.startsWith(q))starts.push(t);else if(lt.includes(q))contains.push(t);if(starts.length+contains.length>=limit+4)break;}
  return starts.concat(contains).slice(0,limit);
}

/* Guide visuel des zones de placement (affiché pendant un drag). */
function showGuide(mode){const g=$('dropGuide');if(!g)return;g.setAttribute('data-mode',mode);g.classList.add('show');}
function hideGuide(){const g=$('dropGuide');if(g)g.classList.remove('show');}
/* MÊMES constantes que la carte de swipe (index.html ORB_LAYOUT) → placement identique. */
const ORB_LAYOUT={COL0:0.735,COL_GAP:0.42,ROW_STEP:0.215,MAX_PER_COL:4};
/* Hauteur de référence = ratio de la vraie carte de swipe (380 × 620) → l'écart vertical
   des bulles est identique à l'écran de swipe, peu importe la hauteur réelle de la carte éditeur. */
const SWIPE_CARD_ASPECT=620/380;
function orbLayout(n){
  const {COL0,COL_GAP,ROW_STEP,MAX_PER_COL}=ORB_LAYOUT;
  const pos=new Array(n);
  const sides=[[],[]];for(let i=0;i<n;i++)sides[i%2].push(i);
  sides.forEach((arr,s)=>{const sign=s===0?-1:1;
    for(let c=0;c*MAX_PER_COL<arr.length;c++){
      const chunk=arr.slice(c*MAX_PER_COL,c*MAX_PER_COL+MAX_PER_COL);
      const rx=sign*(COL0+c*COL_GAP);
      const startRy=-((chunk.length-1)*ROW_STEP)/2;
      chunk.forEach((idx,r)=>pos[idx]={rx,ry:startRy+r*ROW_STEP});
    }
  });
  return pos;
}
function renderOrbs(){
  const layer=$('orbLayer'); layer.innerHTML='';
  const card=document.getElementById('card');
  const cardW=(card&&card.offsetWidth)||380;
  const cardH=(card&&card.offsetHeight)||(cardW*SWIPE_CARD_ASPECT);
  // Orbe = 115px sur une carte de 380 (ratio exact du swipe ≈ 0.302).
  const D=Math.round(cardW*0.302);
  // ry est une fraction de la HAUTEUR de la carte de swipe → on convertit vers la hauteur réelle.
  const refH=cardW*SWIPE_CARD_ASPECT;
  const vScale=refH/cardH; // garde l'écart vertical à l'échelle du swipe
  const pos=orbLayout(S.orbs.length);
  S.orbs.forEach((o,i)=>{
    if(typeof o.x!=='number'||typeof o.y!=='number'){const p=pos[i];o.x=50+p.rx*100;o.y=50+p.ry*vScale*100;}
    const wrap=document.createElement('div'); wrap.className='orb-wrap';
    wrap.style.left=o.x+'%'; wrap.style.top=o.y+'%';
    const orb=document.createElement('div'); orb.className='orb'; orb.dataset.kind=o.kind;
    orb.style.width=D+'px'; orb.style.height=D+'px';
    orb.innerHTML = o.cover?`<img src="${o.cover}" alt="">`:ORB_ICON[o.kind];
    const svg=orb.querySelector('svg'); if(svg){ svg.style.width=Math.round(D*0.34)+'px'; svg.style.height=Math.round(D*0.34)+'px'; }
    const del=document.createElement('div'); del.className='orb-del'; del.textContent='✕';
    del.style.width=Math.round(D*0.28)+'px'; del.style.height=Math.round(D*0.28)+'px'; del.style.fontSize=Math.round(D*0.15)+'px';
    del.addEventListener('pointerdown',e=>e.stopPropagation());
    del.addEventListener('click',e=>{e.stopPropagation();S.orbs.splice(i,1);renderOrbs();toast('Bulle retirée');const h=document.getElementById('orbHint');if(h)h.textContent=`${S.orbs.length}/${ORB_MAX} bulles · glisse-les pour les placer · clique pour retirer`;});
    orb.appendChild(del);
    const lbl=document.createElement('div'); lbl.className='orb-label'; lbl.textContent=o.title;
    lbl.style.maxWidth=(D+24)+'px'; lbl.style.fontSize=Math.max(9,Math.round(D*0.13))+'px';
    const col=document.createElement('div'); col.style.cssText='display:flex;flex-direction:column;align-items:center';
    col.appendChild(orb); col.appendChild(lbl);
    wrap.appendChild(col);
    // === drag : placer la bulle où on veut autour de la carte ===
    let drag=null;
    wrap.addEventListener('pointerdown',e=>{if(e.target.closest('.orb-del'))return;if(e.button)return;e.preventDefault();try{wrap.setPointerCapture(e.pointerId);}catch(_){}const lr=layer.getBoundingClientRect();drag={mx:e.clientX,my:e.clientY,x0:o.x,y0:o.y,lw:lr.width||1,lh:lr.height||1,moved:false};wrap.classList.add('dragging');showGuide('orb');});
    wrap.addEventListener('pointermove',e=>{if(!drag)return;const ddx=(e.clientX-drag.mx)/drag.lw*100,ddy=(e.clientY-drag.my)/drag.lh*100;if(Math.abs(ddx)+Math.abs(ddy)>1.2)drag.moved=true;o.x=clamp(drag.x0+ddx,-55,155);o.y=clamp(drag.y0+ddy,-45,145);wrap.style.left=o.x+'%';wrap.style.top=o.y+'%';});
    const endDrag=e=>{if(!drag)return;const moved=drag.moved;drag=null;wrap.classList.remove('dragging');hideGuide();try{wrap.releasePointerCapture(e.pointerId);}catch(_){}if(moved)persist();};
    wrap.addEventListener('pointerup',endDrag);wrap.addEventListener('pointercancel',endDrag);
    layer.appendChild(wrap);
  });
  if(typeof persist==='function') persist();
}

function makeSticker(g,idx,layer){
  if(typeof g.x!=='number')g.x=50; if(typeof g.y!=='number')g.y=28; if(typeof g.w!=='number')g.w=34; if(typeof g.rot!=='number')g.rot=0;
  const el=document.createElement('div'); el.className='sticker';
  const apply=()=>{el.style.left=g.x+'%';el.style.top=g.y+'%';el.style.width=g.w+'%';el.style.transform=`translate(-50%,-50%) rotate(${g.rot}deg)`;};
  apply();
  el.innerHTML=`<div class="sticker-inner"><img src="${g.url}" alt="" draggable="false"></div>
    <button class="sk-handle sk-del" title="Retirer"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"><path d="M6 6l12 12M18 6 6 18"/></svg></button>
    <div class="sk-handle sk-rot" title="Rotation"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 3-6.7L3 8"/><path d="M3 3v5h5"/></svg></div>
    <div class="sk-handle sk-size" title="Taille"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H3v-6M21 9V3h-6M3 21 10 14M21 3l-7 7"/></svg></div>`;
  const center=()=>{const r=el.getBoundingClientRect();return{x:r.left+r.width/2,y:r.top+r.height/2};};
  el.querySelector('.sk-del').addEventListener('pointerdown',e=>e.stopPropagation());
  el.querySelector('.sk-del').addEventListener('click',e=>{e.stopPropagation();S.gifs.splice(idx,1);renderGifs();toast('GIF retiré');const h=document.getElementById('gifHint');if(h)h.textContent=`${S.gifs.length}/${GIF_MAX} GIFs · glisse · coin vert = taille · coin bleu = rotation`;});
  // déplacer
  let drag=null;
  el.addEventListener('pointerdown',e=>{if(e.target.closest('.sk-handle'))return;if(e.button)return;e.preventDefault();try{el.setPointerCapture(e.pointerId);}catch(_){}const lr=layer.getBoundingClientRect();drag={mx:e.clientX,my:e.clientY,x0:g.x,y0:g.y,lw:lr.width,lh:lr.height};el.classList.add('dragging');el.style.zIndex='10';showGuide('gif');});
  el.addEventListener('pointermove',e=>{if(!drag)return;g.x=clamp(drag.x0+(e.clientX-drag.mx)/drag.lw*100,-10,110);g.y=clamp(drag.y0+(e.clientY-drag.my)/drag.lh*100,-10,110);apply();});
  const endDrag=e=>{if(!drag)return;drag=null;el.classList.remove('dragging');el.style.zIndex='';hideGuide();try{el.releasePointerCapture(e.pointerId);}catch(_){}persist();};
  el.addEventListener('pointerup',endDrag);el.addEventListener('pointercancel',endDrag);
  // taille
  const rz=el.querySelector('.sk-size');
  rz.addEventListener('pointerdown',e=>{e.preventDefault();e.stopPropagation();try{rz.setPointerCapture(e.pointerId);}catch(_){}const c=center();const d0=Math.max(8,Math.hypot(e.clientX-c.x,e.clientY-c.y));const w0=g.w;const mv=ev=>{g.w=clamp(w0*(Math.hypot(ev.clientX-c.x,ev.clientY-c.y)/d0),12,75);apply();};const up=ev=>{rz.removeEventListener('pointermove',mv);rz.removeEventListener('pointerup',up);try{rz.releasePointerCapture(ev.pointerId);}catch(_){}persist();};rz.addEventListener('pointermove',mv);rz.addEventListener('pointerup',up);});
  // rotation
  const ro=el.querySelector('.sk-rot');
  ro.addEventListener('pointerdown',e=>{e.preventDefault();e.stopPropagation();try{ro.setPointerCapture(e.pointerId);}catch(_){}const c=center();const a0=Math.atan2(e.clientY-c.y,e.clientX-c.x)*180/Math.PI;const r0=g.rot;const mv=ev=>{const a=Math.atan2(ev.clientY-c.y,ev.clientX-c.x)*180/Math.PI;g.rot=Math.round(r0+(a-a0));apply();};const up=ev=>{ro.removeEventListener('pointermove',mv);ro.removeEventListener('pointerup',up);try{ro.releasePointerCapture(ev.pointerId);}catch(_){}persist();};ro.addEventListener('pointermove',mv);ro.addEventListener('pointerup',up);});
  return el;
}

      <div class="color-side">
        <div class="grad-prev"></div>
        <input id="hexC1" value="${S.c1.toUpperCase()}" maxlength="7" spellcheck="false" style="width:120px;padding:9px 12px;border-radius:10px;color:#fff;outline:none;text-transform:uppercase;background:rgba(255,255,255,.05);border:1.5px solid var(--stroke-2);font-family:inherit">
        <div class="swatches">${SWATCHES.map(c=>`<button data-c="${c}" style="background:linear-gradient(180deg,${c},${darken(c,.5)})"></button>`).join('')}</div>
        <button class="btn color-reset" id="colReset">↺ Couleur Discord</button>
      </div>
    </div>`;
  const cv=sh.querySelector('#hueWheel'),ctx=cv.getContext('2d'),R=85,r=52;
  for(let a=0;a<360;a++){ctx.beginPath();ctx.strokeStyle=`hsl(${a},100%,58%)`;ctx.lineWidth=R-r;ctx.arc(R,R,(R+r)/2,(a-1)*Math.PI/180,(a+1.5)*Math.PI/180);ctx.stroke();}
  const pick=e=>{const rect=cv.getBoundingClientRect();const dx=e.clientX-rect.left-R,dy=e.clientY-rect.top-R;const hue=((Math.atan2(dy,dx)*180/Math.PI)+360)%360;applyColor(hslToHex(hue,100,60));};
  let down=false;cv.addEventListener('pointerdown',e=>{down=true;cv.setPointerCapture(e.pointerId);pick(e);});cv.addEventListener('pointermove',e=>down&&pick(e));cv.addEventListener('pointerup',()=>down=false);
  sh.querySelector('#hexC1').addEventListener('input',e=>{const v=e.target.value.trim();if(/^#[0-9a-f]{6}$/i.test(v))applyColor(v);});
  sh.querySelectorAll('[data-c]').forEach(b=>b.addEventListener('click',()=>applyColor(b.dataset.c)));
  sh.querySelector('#colReset').addEventListener('click',()=>{applyColor('#5865F2');toast('Dégradé Discord appliqué');});
}

/* ===== 5. MUSIQUE D'ENTRÉE ===== */
const music={sel:null,startSec:0,audio:null};
function stopAudition(){if(music.audio){music.audio.pause();music.audio=null;}const b=document.getElementById('audBtn');if(b)b.textContent='▶ Écouter l\'extrait';}
function renderMusicSheet(sh){
  sh.innerHTML=sheetHeader('Musique d\'entrée du profil')+`
    <div class="search-row"><input id="musicSearch" placeholder="Rechercher un titre, un artiste…" autocomplete="off"></div>
    <div class="sugg-list" id="trackList"></div>
    <div class="scrub-zone" id="selZone" hidden>
      <div class="scrub-label" id="winLbl">🎵 Extrait de 30 s — joué à l'entrée de ton profil</div>
      <div class="row-end"><button class="btn" id="audBtn">▶ Écouter l'extrait</button><button class="btn primary" id="musicOk">Confirmer</button></div>
      <div class="hint">Le timing est fixé sur les 30 s d'aperçu — pas de réglage de départ.</div>
    </div>`;
  let deb=null;
  sh.querySelector('#musicSearch').addEventListener('input',e=>{clearTimeout(deb);const q=e.target.value.trim();if(q.length<2)return;deb=setTimeout(async()=>{const list=sh.querySelector('#trackList');list.innerHTML='<div class="hint">Recherche…</div>';let tracks=[];try{tracks=await searchSpotifyTracks(q);}catch(_){}const ts=tracks.filter(t=>t.previewUrl&&t.cover);list.innerHTML='';if(!ts.length){list.innerHTML='<div class="hint">Aucun résultat</div>';return;}ts.forEach(t=>{const b=document.createElement('button');b.className='sugg';b.innerHTML=`<img src="${t.cover}" alt=""><span class="ti"><b>${esc(t.name)}</b><small>${esc(t.artist)}</small></span>`;b.addEventListener('click',()=>selectTrack({title:t.name,artist:t.artist,cover:t.cover,previewUrl:t.previewUrl,durSec:30}));list.appendChild(b);});},320);});
  setTimeout(()=>sh.querySelector('#musicSearch').focus(),250);
}
function selectTrack(t){stopAudition();music.sel=t;music.startSec=0;const sh=$('sheet');sh.querySelector('#trackList').innerHTML=`<div class="sugg" style="border-color:rgba(145,70,255,.6)"><img src="${t.cover}"><span class="ti"><b>${esc(t.title)}</b><small>${esc(t.artist)}</small></span></div>`;sh.querySelector('#selZone').hidden=false;const audBtn=sh.querySelector('#audBtn');audBtn.onclick=()=>{if(music.audio&&!music.audio.paused){stopAudition();return;}music.audio=new Audio(t.previewUrl);music.audio.volume=.5;music.audio.play().catch(()=>toast('Lecture bloquée — re-clique'));audBtn.textContent='⏸ Pause';music.audio.addEventListener('ended',stopAudition);};sh.querySelector('#musicOk').onclick=()=>{S.music=Object.assign({},t,{startSec:0});renderMusicChip();persist();closeSheet();toast('Musique d\'entrée enregistrée');};}
let chipAudio=null;
function renderMusicChip(){renderMusicNow();const chip=$('musicChip');if(!chip)return;if(!S.music){chip.innerHTML='<span class="empty">Aucune musique — bouton « Musique » en bas</span>';return;}const m=S.music;chip.innerHTML=`<span class="cov" style="background-image:url('${m.cover}')"></span><span class="mi"><b>${esc(m.title)}</b><small>${esc(m.artist)}</small></span><span class="win">${fmt(m.startSec)} → ${fmt(Math.min(m.startSec+30,m.durSec))}</span>`;chip.onclick=()=>{if(chipAudio&&!chipAudio.paused){chipAudio.pause();chipAudio=null;return;}chipAudio=new Audio(m.previewUrl);chipAudio.volume=.5;chipAudio.play().catch(()=>{});};}
/* étiquette « musique d'entrée » au-dessus du bouton Annuler */
let nowAudio=null;
function renderMusicNow(){const el=$('musicNow');if(!el)return;if(!S.music){el.classList.remove('show');el.innerHTML='';if(nowAudio){nowAudio.pause();nowAudio=null;}return;}const m=S.music;el.innerHTML=`<span class="cov" style="background-image:url('${m.cover||''}')"></span><span class="mi"><span class="note">Musique d'entrée</span><b>${esc(m.title)}</b><small>${esc(m.artist)}</small></span>`;el.classList.add('show');el.onclick=()=>{if(nowAudio&&!nowAudio.paused){nowAudio.pause();nowAudio=null;return;}nowAudio=new Audio(m.previewUrl);nowAudio.volume=.5;nowAudio.play().catch(()=>{});};}
/* yeux : masquer visuellement carte / bulles / GIFs (éditeur uniquement, pas sauvegardé) */
document.querySelectorAll('.eye-dot').forEach(btn=>{btn.addEventListener('click',e=>{e.stopPropagation();e.preventDefault();const on=document.body.classList.toggle('hide-'+btn.dataset.eye);btn.classList.toggle('off',on);});});

document.addEventListener('keydown',e=>{if(e.key!=='Escape')return;if($('cropModal').classList.contains('open'))$('cropCancel').click();else if($('voiceModal').classList.contains('open'))closeVoiceModal();else closeSheet();});

/* ===================================================================
   PONT avec le vrai profil Tindord (localStorage tindord_state, même
   domaine que le site) — charge ton profil, et renvoie tes modifs.
   =================================================================== */
const STATE_KEY='tindord_state';
function readSite(){ try{ return JSON.parse(localStorage.getItem(STATE_KEY)||'{}'); }catch(_){ return {}; } }
// Snapshot du profil à l'ouverture — sert au bouton « Annuler » (avant toute écriture).
const _entrySnapshot = localStorage.getItem(STATE_KEY);
let _persistT=null;
function writeState(){
  const st=readSite(); st.user=st.user||{}; st.profile=st.profile||{};
  st.user.displayName=S.username;
  st.profile.bio=S.bio;
  if(S.avatar) st.user.avatarUrl=S.avatar.url;
  if(S.banner){ st.user.bannerUrl=S.banner.url; st.user.bannerCustom=true; }
  st.user.profileColor=S.c1; st.user.profileColor2=S.c2;
  if(S.bg.type==='preset') st.user.boostBg=S.bg.value;
  st.profile.userOrbs=S.orbs.map(o=>({kind:o.kind,title:o.title,sub:o.sub||'',cover:o.cover||null,previewUrl:o.previewUrl||null,x:o.x,y:o.y}));
  st.user.gifs=S.gifs.map(g=>({preview:g.url,full:g.url,x:g.x,y:g.y,w:g.w,rot:g.rot}));
  if(S.music) st.user.swipeMusic={title:S.music.title,artist:S.music.artist,cover:S.music.cover,previewUrl:S.music.previewUrl,startSec:S.music.startSec};
  if(S.voice) st.user.profileVoice=S.voice.url;
  try{ localStorage.setItem(STATE_KEY, JSON.stringify(st)); }catch(_){}
}
function persist(){ clearTimeout(_persistT); _persistT=setTimeout(writeState,400); }
function saveNow(){ clearTimeout(_persistT); writeState(); }
window.__persist = persist;
/* Décoration d'avatar Discord + point de statut, déposés par-dessus l'avatar (réappliqués après tout setCroppedMedia). */
let _decorationUrl=null;
function applyAvatarDeco(){
  const slot=$('avatarSlot'); if(!slot) return;
  slot.querySelectorAll('.avi-deco,.status-dot').forEach(e=>e.remove());
  const dot=document.createElement('span'); dot.className='status-dot'; dot.title='En ligne'; slot.appendChild(dot);
  if(_decorationUrl){ const d=document.createElement('img'); d.className='avi-deco'; d.src=_decorationUrl; d.alt=''; slot.appendChild(d); }
}
function hydrateFromSite(){
  const st=readSite(); const u=st.user||{}, p=st.profile||{};
  const note=document.querySelector('.note'); // peut ne plus exister (topbar simplifiée)
  if(!u.displayName && !u.avatarUrl && !(p&&p.bio)){
    if(note) note.textContent='Connecte-toi sur tindord.com puis reviens — ton profil se chargera ici';
    return;
  }
  if(note) note.textContent='Relié à ton profil Tindord — tes modifs sont sauvegardées';
  if(u.displayName){ S.username=u.displayName; $('usernameSlot').textContent=u.displayName; }
  if(u.discordTag){ document.querySelector('.tag').textContent='@'+u.discordTag+' · en ligne sur Tindord'; }
  if(typeof p.bio==='string' && p.bio.trim()){ S.bio=p.bio.trim(); $('bioSlot').textContent=S.bio; }
  if(u.avatarUrl){ S.avatar={url:u.avatarUrl,posX:50,posY:50,scale:1}; setCroppedMedia($('avatarSlot'),S.avatar,'<div class="ph">'+(u.displayName||'T').charAt(0).toUpperCase()+'</div>'); }
  // Décoration d'avatar + point de statut Discord → la carte éditeur colle au vrai profil.
  _decorationUrl = u.decorationUrl || null;
  applyAvatarDeco();
  if(u.bannerUrl){ S.banner={url:u.bannerUrl,posX:50,posY:50,scale:1}; setCroppedMedia($('bannerSlot'),S.banner,''); }
  if(u.profileColor && /^#[0-9a-f]{6}$/i.test(u.profileColor)){
    S.c1=u.profileColor; S.c2=(u.profileColor2&&/^#[0-9a-f]{6}$/i.test(u.profileColor2))?u.profileColor2:darken(S.c1,.55);
    const r=document.documentElement.style; r.setProperty('--accent',S.c1); r.setProperty('--c1',S.c1); r.setProperty('--c2',S.c2);
  }
  if(u.boostBg){ applyBg({type:'preset',value:u.boostBg}); }
  if(Array.isArray(p.userOrbs)&&p.userOrbs.length){
    S.orbs=p.userOrbs.map(o=>({kind:(o.kind==='anime'?'film':o.kind),title:o.title,sub:o.sub||'',cover:o.cover||null,previewUrl:o.previewUrl||null,x:typeof o.x==='number'?o.x:undefined,y:typeof o.y==='number'?o.y:undefined}))
      .filter(o=>['music','game','film'].includes(o.kind)).slice(0,ORB_MAX);
    renderOrbs();
  }
  if(Array.isArray(u.gifs)&&u.gifs.length){
    S.gifs=u.gifs.slice(0,GIF_MAX).map(g=>({url:g.full||g.preview,x:typeof g.x==='number'?g.x:50,y:typeof g.y==='number'?g.y:28,w:g.w||34,rot:g.rot||0}));
    renderGifs();
  }
  if(u.swipeMusic){ S.music={title:u.swipeMusic.title,artist:u.swipeMusic.artist||'',cover:u.swipeMusic.cover||'',previewUrl:u.swipeMusic.previewUrl||'',durSec:30,startSec:u.swipeMusic.startSec||0}; renderMusicChip(); }
  if(u.profileVoice){ S.voice={url:u.profileVoice,dur:5}; renderVoice(); }
}

applyColor(S.c1);
drawIdleWave();
hydrateFromSite();

/* ===== Bas de l'écran : Retour (gauche). Aperçu est collé à la barre d'outils. ===== */
/* Retour (bas-gauche) : tes modifs sont déjà enregistrées en continu → on revient à l'app. */
$('btnBack').addEventListener('click',()=>{ saveNow(); toast('✅ Profil enregistré'); setTimeout(()=>{location.href='index.html';},500); });
/* Aperçu (collé aux 5 outils) : sauvegarde puis ouvre l'aperçu du profil. */
$('btnPreview').addEventListener('click',()=>{ saveNow(); location.href='index.html#preview'; });
/* Paramètres (haut-droite) : sauvegarde puis ouvre l'écran compte/paramètres. */
$('btnSettings').addEventListener('click',()=>{ saveNow(); location.href='index.html#account'; });
</script>
